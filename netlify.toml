# netlify.toml
# Place this in the root of your Netlify-deployed repo.

[build]
  functions = "netlify/functions"
  publish    = "."          # static HTML files are in root

# Functions need clinic.html in the bundle so the SSR function
# can read the template at runtime.
[functions]
  included_files = ["clinic.html"]


# ── CANONICAL HOMEPAGE ───────────────────────────────────────────
# Redirect /index.html to / so the duplicate path stops competing in search.
[[redirects]]
  from   = "/index.html"
  to     = "/"
  status = 301
  force  = true


# ── STUDIO + VISUALIZE MOVED TO SKINDAY.COM (M3 migration) ───────
# Studio and Visualize now live on the global site. These forward any old
# skinday.ca links/bookmarks to the new home.
# force = true is REQUIRED: the old studio.html / visualize.html files still
# exist in this repo, and without force Netlify serves the static file
# instead of redirecting.
# Using 302 (temporary) for the first 48-72h to verify everything works on
# skinday.com. Switch all four to 301 (permanent) once confirmed stable.
[[redirects]]
  from   = "/studio"
  to     = "https://skinday.com/studio.html"
  status = 302
  force  = true

[[redirects]]
  from   = "/studio.html"
  to     = "https://skinday.com/studio.html"
  status = 302
  force  = true

[[redirects]]
  from   = "/visualize"
  to     = "https://skinday.com/visualize.html"
  status = 302
  force  = true

[[redirects]]
  from   = "/visualize.html"
  to     = "https://skinday.com/visualize.html"
  status = 302
  force  = true


