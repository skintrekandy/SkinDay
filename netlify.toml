# ── DYNAMIC SITEMAP ──────────────────────────────────────────────
# Serves live clinic slugs from Supabase instead of the stale static file.
# `force = true` ensures this overrides any leftover static sitemap.xml.
[[redirects]]
  from   = "/sitemap.xml"
  to     = "/.netlify/functions/sitemap"
  status = 200
  force  = true
