# netlify.toml
# Place this in the root of your Netlify-deployed repo.

[build]
  functions = "netlify/functions"
  publish    = "."          # static HTML files are in root

# Functions need clinic.html in the bundle so the SSR function
# can read the template at runtime.
[functions]
  included_files = ["clinic.html"]


# ── API FUNCTIONS ────────────────────────────────────────────────
[[redirects]]
  from   = "/api/get-clinics"
  to     = "/.netlify/functions/get-clinics"
  status = 200

[[redirects]]
  from   = "/api/submit-claim"
  to     = "/.netlify/functions/submit-claim"
  status = 200

[[redirects]]
  from   = "/api/update-profile"
  to     = "/.netlify/functions/update-profile"
  status = 200

[[redirects]]
  from   = "/api/admin-action"
  to     = "/.netlify/functions/admin-action"
  status = 200

[[redirects]]
  from   = "/api/save-clinic"
  to     = "/.netlify/functions/save-clinic"
  status = 200

[[redirects]]
  from   = "/api/track-click"
  to     = "/.netlify/functions/track-click"
  status = 200

[[redirects]]
  from   = "/api/submit-visit"
  to     = "/.netlify/functions/submit-visit"
  status = 200

[[redirects]]
  from   = "/api/get-visit-signal"
  to     = "/.netlify/functions/get-visit-signal"
  status = 200

[[redirects]]
  from   = "/api/update-visit"
  to     = "/.netlify/functions/update-visit"
  status = 200


# ── CLINIC PAGES (SSR) ───────────────────────────────────────────
# Server-side render clinic profile pages so Google sees real <title>,
# meta description, and content baked into the HTML. The existing
# client-side JS still hydrates on top of the SSR output for users.
# `force = true` is required to override the static clinic.html file.
[[redirects]]
  from   = "/clinic/:slug"
  to     = "/.netlify/functions/render-clinic?slug=:slug"
  status = 200
  force  = true


# ── BOTOX CITY PAGES (pretty URLs) ───────────────────────────────
# Maps /botox-{city} → /botox-{city}.html for clean URLs.
# This list must match the HTML files actually deployed in the repo root.
# When adding a new city, add the .html file AND a redirect here AND update
# BOTOX_CITY_PAGES in netlify/functions/sitemap.js.

